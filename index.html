  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="'+(extraStyle||'')+'">'+p+'</svg>';
}
function chevLeft(color){
  return '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>';
}

var S = { dark:false, page:"cadencia", query:"", openBlock:"contato", openObj:{}, tipsOpen:false, kbQuery:"", kbOpen:{}, editing:false, dirty:false, editTarget:null, redOpen:false, redTab:"churn", redQuery:"", redSel:0, procOpen:false, procTab:"efet", procStep:-1, copOpen:false, copInput:"", copResults:null, copSel:0 };
function T(){ return S.dark ? THEMES.dark : THEMES.light; }

function filteredBlocks(){
  var q = S.query.trim().toLowerCase();
  if(!q) return BLOCKS;
  var out=[];
  BLOCKS.forEach(function(b){
    if(b.title.toLowerCase().indexOf(q)>=0){ out.push(b); return; }
    var m=b.messages.filter(function(x){ return (x.label+x.text).toLowerCase().indexOf(q)>=0; });
    var o=b.objections.filter(function(x){ return (x.title+x.risk+x.cause+x.action).toLowerCase().indexOf(q)>=0; });
    if(m.length||o.length){ out.push(Object.assign({},b,{ messages:m.length?m:b.messages, objections:o, _hitObj:o.length>0 })); }
  });
  return out;
}
function filteredKB(){
  var q = S.kbQuery.trim().toLowerCase();
  if(!q) return KB_GROUPS;
  var out=[];
  KB_GROUPS.forEach(function(g){
    var items=g.items.filter(function(it){ return (it.title+it.body).toLowerCase().indexOf(q)>=0; });
    if(items.length) out.push(Object.assign({},g,{ items:items }));
  });
  return out;
}

function editBtn(kind, ref){
  // botãozinho de lápis que só aparece no modo de edição
  return '<button data-edit="'+esc(kind+":"+ref)+'" title="Editar" style="display:flex; align-items:center; justify-content:center; width:26px; height:26px; border-radius:7px; border:1px solid '+(S.dark?"#3a445f":"#dce1ef")+'; background:transparent; cursor:pointer; flex-shrink:0;">'+svg("Pencil",13,A.coral)+'</button>';
}
function inlineEditor(targetId, current){
  var t=T();
  return '<div style="margin-top:8px; padding:10px; border-radius:10px; border:1.5px dashed '+A.coral+'; background:'+(S.dark?"rgba(251,100,83,0.06)":"#fffaf8")+';">'+
    '<textarea id="editArea" style="width:100%; min-height:90px; box-sizing:border-box; padding:9px; border-radius:8px; border:1.5px solid '+t.searchBorder+'; background:'+t.cardBg+'; color:'+t.text+'; font-family:inherit; font-size:12.5px; line-height:1.5; resize:vertical; outline:none;">'+esc(current)+'</textarea>'+
    '<div style="display:flex; gap:7px; margin-top:8px;">'+
      '<button data-editsave="'+esc(targetId)+'" style="display:flex; align-items:center; gap:5px; padding:7px 13px; border-radius:8px; border:none; background:'+A.green+'; color:'+A.white+'; font-weight:700; font-size:12px; cursor:pointer;">'+svg("Save",13,A.white)+' Salvar</button>'+
      '<button data-editcancel="1" style="padding:7px 13px; border-radius:8px; border:1.5px solid '+t.border+'; background:transparent; color:'+t.text2+'; font-weight:600; font-size:12px; cursor:pointer;">Cancelar</button>'+
    '</div>'+
  '</div>';
}
// Localiza e atualiza um campo de texto nos dados, a partir de um id "tipo|...".
function applyEdit(targetId, newText){
  var p = targetId.split("|");
  var kind = p[0];
  if(kind==="msg"){
    // msg|blockId|index
    var b = BLOCKS.filter(function(x){return x.id===p[1];})[0];
    if(b && b.messages[+p[2]]) b.messages[+p[2]].text = newText;
  } else if(kind==="obj"){
    // obj|blockId|index|field
    var b2 = BLOCKS.filter(function(x){return x.id===p[1];})[0];
    if(b2 && b2.objections[+p[2]]) b2.objections[+p[2]][p[3]] = newText;
  } else if(kind==="kb"){
    // kb|itemId
    for(var g=0; g<KB_GROUPS.length; g++){
      var it = KB_GROUPS[g].items.filter(function(x){return x.id===p[1];})[0];
      if(it){ it.body = newText; break; }
    }
  }
  S.dirty = true;
}
function messageCard(m, t, blockId, idx){

    '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;">'+
      '<span style="font-size:11px; font-weight:700; color:'+(dark?A.royalLight:A.royal)+'; background:'+t.chipBg+'; padding:3px 9px; border-radius:6px;">'+esc(m.label)+'</span>'+
      (S.editing?editBtn("msg", blockId+"|"+idx):'')+

    (isEditing ? inlineEditor(tid, m.text) :
    '<p style="margin:0 0 10px; color:'+t.text2+'; font-size:12.5px; line-height:1.55; white-space:pre-wrap;">'+esc(m.text)+'</p>'+

}

function objectionCard(o,t,blockId,idx){

function block(b,t){
  var dark=S.dark;
  var q=S.query.trim().toLowerCase();
  var open = !!q || S.openBlock===b.id;
  var objOpen = !!q ? !!b._hitObj : !!S.openObj[b.id];
  var inner='';
  if(open){
    inner+='<div style="padding:4px 14px 14px;">';
    b.messages.forEach(function(m,mi){ inner+=messageCard(m,t,b.id,mi); });
    if(b.objections.length>0){
      inner+='<div style="margin-top:10px;">'+
        '<button data-toggleobj="'+b.id+'" style="width:100%; display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:9px; border:1.5px solid '+(objOpen?A.coral:"rgba(251,100,83,0.35)")+'; background:'+(objOpen?"rgba(251,100,83,0.08)":"transparent")+'; cursor:pointer;">'+
          svg("AlertTriangle",14,A.coral)+
          '<span style="flex:1; text-align:left; color:'+A.coral+'; font-weight:700; font-size:12.5px;">Objeções deste tema ('+b.objections.length+')</span>'+
          svg("ChevronDown",16,A.coral,"transform:"+(objOpen?"rotate(180deg)":"none")+"; transition:transform .2s;")+
        '</button>';
      if(objOpen){
        inner+='<div style="display:flex; flex-direction:column; gap:8px; margin-top:8px;">';
        b.objections.forEach(function(o,oi){ inner+=objectionCard(o,t,b.id,oi); });
        inner+='</div>';
      }
      inner+='</div>';
    } else {
      inner+='<p style="margin:10px 2px 0; font-size:11px; color:'+t.text3+'; font-style:italic;">Sem objeções mapeadas para este tema.</p>';
    }
    inner+='</div>';
  }
  return ''+
  '<div style="border:1px solid '+t.border+'; border-radius:13px; overflow:hidden; background:'+t.cardBg+';">'+
    '<button data-toggleblock="'+b.id+'" style="width:100%; display:flex; align-items:center; gap:10px; padding:12px 14px; border:none; background:'+(open?t.blockHeadOpen:t.cardBg)+'; cursor:pointer; text-align:left;">'+
      '<div style="width:32px; height:32px; border-radius:9px; background:'+(dark?A.royal:A.navy)+'; display:flex; align-items:center; justify-content:center; flex-shrink:0;">'+svg(b.icon,17,A.white)+'</div>'+

      '</div>'+
      svg("ChevronDown",18,t.text3,"transform:"+(open?"rotate(180deg)":"none")+"; transition:transform .2s;")+
    '</button>'+
    inner+
  '</div>';
}
function kbRow(item, idx, t, last){

      ? '<div style="padding:0 4px 12px 33px;">'+inlineEditor(tid, item.body)+'</div>'

    '</button>'+

}

function redNorm(s){ return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function redList(){
  var arr = S.redTab==="rev" ? REVERSOES : CHURNS;
  var q = redNorm(S.redQuery).trim();
  if(!q) return arr;
  return arr.filter(function(it){
    if(redNorm(it.label).indexOf(q)>=0) return true;
    for(var i=0;i<it.keys.length;i++){ var k=redNorm(it.keys[i]); if(k.indexOf(q)>=0 || q.indexOf(k)>=0) return true; }
    return false;
  });
}

];
function copNorm(s){ return String(s).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g," "); }
function copObjByRef(ref){
  var p = ref.split("|");
  var b = null;
  for(var i=0;i<BLOCKS.length;i++){ if(BLOCKS[i].id===p[0]){ b=BLOCKS[i]; break; } }
  if(!b) return null;
  var o = b.objections[parseInt(p[1],10)];
  if(!o) return null;
  return { block:b, obj:o };
}
function copDetect(text){
  var t = copNorm(text);
  if(!t || t.length<2) return [];
  var scored = [];
  COPILOTO.forEach(function(c){
    var score=0, hits=[];
    c.kw.forEach(function(k){
      var nk = copNorm(k);
      if(t.indexOf(nk) >= 0){ score += nk.split(" ").length; hits.push(k); }
    });
    if(score>0) scored.push({ ref:c.ref, score:score, hits:hits });
  });
  scored.sort(function(a,b){ return b.score - a.score; });
  return scored;
}

    '<div style="width:32px; height:32px; border-radius:9px; background:'+A.coral+'; display:flex; align-items:center; justify-content:center; flex-shrink:0;">'+svg("Lightbulb",17,A.white)+'</div>'+
    '<div style="flex:1;"><div style="font-weight:700; font-size:15px; color:'+t.text+';">Boas práticas</div><div style="font-size:11px; color:'+t.text3+';">Gatilhos rápidos de atendimento</div></div>'+
    '<button data-tips-toggle="1" aria-label="Fechar" style="width:30px; height:30px; border-radius:8px; border:1px solid '+t.border+'; background:'+t.cardSoft+'; cursor:pointer; display:flex; align-items:center; justify-content:center;">'+svg("X",16,t.text2)+'</button>'+
  '</div>';
  card += '<div style="padding:12px 16px 16px; display:flex; flex-direction:column; gap:8px;">';
  TIPS.forEach(function(tip){
    card += '<div style="display:flex; gap:10px; align-items:flex-start; padding:11px; border-radius:11px; background:'+t.cardSoft+'; border:1px solid '+t.borderSoft+';">'+
      '<div style="width:30px; height:30px; border-radius:9px; background:rgba(251,100,83,0.13); display:flex; align-items:center; justify-content:center; flex-shrink:0;">'+svg(tip.icon,16,A.coral)+'</div>'+
      '<div><p style="margin:0; font-weight:700; font-size:12.5px; color:'+t.text+';">'+esc(tip.title)+'</p><p style="margin:2px 0 0; font-size:11.5px; color:'+t.text2+'; line-height:1.4;">'+esc(tip.text)+'</p></div>'+
    '</div>';
  });
  card += '</div></div></div>';
  return card;
}

function render(){
  var t=T();
  document.body.className = S.dark ? "dark" : "";
  var dark=S.dark;
  var html='';
  html+='<div style="background:'+t.pageBg+'; border-radius:16px; overflow:hidden; max-width:560px; margin:0 auto; box-shadow:0 20px 50px rgba(7,26,87,0.18); position:relative; transition:background .25s;">';

  html+='<div style="background:linear-gradient(135deg, '+t.headerGrad[0]+', '+t.headerGrad[1]+'); padding:16px; display:flex; align-items:center; justify-content:space-between;">'+
    '<div style="display:flex; align-items:center; gap:11px;">'+
      '<div style="width:34px; height:34px; display:flex; align-items:center; justify-content:center; flex-shrink:0;"><img src="'+CASINHA_URI+'" alt="Seazone" width="34" height="34" style="object-fit:contain; display:block;" /></div>'+
      '<div style="display:flex; align-items:center; gap:7px;">'+svg("Compass",19,A.coralSoft)+'<span style="color:'+A.white+'; font-weight:700; font-size:19px; letter-spacing:-0.02em;">Bússola CSO</span></div>'+
    '</div>'+
    '<div style="display:flex; gap:8px;">'+
      (S.editing?'<button data-download="1" title="Baixar HTML atualizado" class="icobtn" style="width:auto; padding:0 11px; gap:6px; background:'+A.green+'; border-color:'+A.green+'; font-weight:700; font-size:12px;">'+svg("Download",15,A.white)+'<span style="color:'+A.white+';">Baixar</span></button>':'')+
      '<button data-edit-toggle="1" title="Editar conteúdo" class="icobtn" style="background:'+(S.editing?A.coral:"rgba(255,255,255,0.08)")+'; border-color:'+(S.editing?A.coral:"rgba(255,255,255,0.2)")+';">'+svg("Pencil",16,A.white)+'</button>'+
      '<button data-page-toggle="1" title="Base de Conhecimento" class="icobtn" style="background:'+(S.page==="kb"?A.coral:"rgba(255,255,255,0.08)")+'; border-color:'+(S.page==="kb"?A.coral:"rgba(255,255,255,0.2)")+';">'+svg("BookOpen",16,A.white)+'</button>'+
      '<button data-theme-toggle="1" class="icobtn">'+svg(dark?"Sun":"Moon",16,A.white)+'</button>'+
    '</div>'+
  '</div>';

  if(S.page==="cadencia"){
    if(S.editing){
      html+='<div style="margin:12px 16px 2px; padding:9px 12px; border-radius:10px; background:rgba(251,100,83,0.10); border:1px solid rgba(251,100,83,0.3); display:flex; align-items:flex-start; gap:8px;">'+
        svg("Pencil",14,A.coral,"flex-shrink:0; margin-top:2px;")+
        '<span style="font-size:11.5px; color:'+t.text2+'; line-height:1.45;">Modo de edição ativo. Toque no lápis de cada item para alterar o texto. Ao terminar, use <b style="color:'+A.coral+';">Baixar</b> no topo para gerar o HTML atualizado e substituir o arquivo da equipe.</span>'+
      '</div>';
    } else {
      html+='<div style="padding:13px 16px 4px; position:relative;">'+
        '<span style="position:absolute; left:27px; top:22px;">'+svg("Search",15,t.text3)+'</span>'+
        '<input id="q" value="'+esc(S.query)+'" placeholder="Buscar mensagem ou objeção (ex: overbooking, bancários)…" style="width:100%; padding:9px 12px 9px 34px; border-radius:10px; border:1.5px solid '+t.searchBorder+'; background:'+t.cardBg+'; font-size:13px; font-weight:500; color:'+t.text+'; outline:none;" />'+
        (S.query?'<span data-clear="q" style="position:absolute; right:28px; top:22px; cursor:pointer;">'+svg("X",15,t.text3)+'</span>':'')+
      '</div>';
      html+='<div style="padding:4px 16px 6px; display:flex; flex-wrap:wrap; gap:8px;">'+
        '<button data-cop-open="1" style="flex:1 1 calc(50% - 4px); display:flex; align-items:center; justify-content:center; gap:7px; padding:9px 10px; border-radius:10px; border:none; cursor:pointer; background:'+(dark?A.royal:A.navy)+'; color:'+A.white+'; font-weight:700; font-size:12.5px;">'+svg("Sparkles",15,A.white)+'Copiloto</button>'+
        '<button data-tips-toggle="1" style="flex:1 1 calc(50% - 4px); display:flex; align-items:center; justify-content:center; gap:7px; padding:9px 10px; border-radius:10px; border:1.5px solid '+A.coral+'; cursor:pointer; background:'+(dark?"rgba(251,100,83,0.10)":"#fff6f4")+'; color:'+A.coral+'; font-weight:700; font-size:12.5px;">'+svg("Lightbulb",15,A.coral)+'Boas práticas</button>'+
        '<button data-red-open="1" style="flex:1 1 calc(50% - 4px); display:flex; align-items:center; justify-content:center; gap:7px; padding:9px 10px; border-radius:10px; border:1.5px solid '+(dark?"#2a3556":"#dce1ef")+'; cursor:pointer; background:'+t.cardSoft+'; color:'+(dark?A.royalLight:A.navy)+'; font-weight:600; font-size:12.5px;">'+svg("FileText",15,(dark?A.royalLight:A.navy))+'Redator</button>'+
        '<button data-proc-open="1" style="flex:1 1 calc(50% - 4px); display:flex; align-items:center; justify-content:center; gap:7px; padding:9px 10px; border-radius:10px; border:1.5px solid '+(dark?"#2a3556":"#dce1ef")+'; cursor:pointer; background:'+t.cardSoft+'; color:'+(dark?A.royalLight:A.navy)+'; font-weight:600; font-size:12.5px;">'+svg("ClipboardList",15,(dark?A.royalLight:A.navy))+'Processo de Churn</button>'+
      '</div>';
    }
    var fb=filteredBlocks();
    html+='<div style="padding:8px 12px 70px; display:flex; flex-direction:column; gap:10px;">';
    if(fb.length===0) html+='<p style="text-align:center; color:'+t.text3+'; font-size:13px; padding:20px 0;">Nada encontrado para "'+esc(S.query)+'".</p>';
    fb.forEach(function(b){ html+=block(b,t); });
    html+='</div>';
  }

  if(S.page==="kb"){
    html+='<div style="background:'+(dark?"#1a1410":"#fff8f5")+';">'+
      '<div style="padding:12px 16px 2px; display:flex; align-items:center; gap:9px;">'+
        '<button data-page-back="1" style="display:flex; align-items:center; gap:5px; padding:7px 12px; border-radius:9px; border:1.5px solid '+(dark?"#4a2e28":"#f0d5cc")+'; background:'+t.cardBg+'; color:'+A.coral+'; font-weight:600; font-size:12.5px; cursor:pointer;">'+chevLeft(A.coral)+' Voltar à cadência</button>'+
      '</div>'+
      '<div style="padding:8px 16px 4px;">'+
        '<div style="display:flex; align-items:center; gap:9px; margin-bottom:3px;">'+
          '<div style="width:30px; height:30px; border-radius:8px; background:'+A.coral+'; display:flex; align-items:center; justify-content:center;">'+svg("BookOpen",16,A.white)+'</div>'+
          '<span style="font-weight:700; font-size:17px; color:'+A.coral+'; letter-spacing:-0.01em;">Base de Conhecimento</span>'+
        '</div>'+
        '<p style="margin:0 0 11px 39px; font-size:11.5px; color:'+t.text3+';">Manual de consulta — no dia a dia, sempre à mão.</p>'+
        '<div style="position:relative;">'+
          '<span style="position:absolute; left:11px; top:10px;">'+svg("Search",15,t.text3)+'</span>'+
          '<input id="kbq" value="'+esc(S.kbQuery)+'" placeholder="Buscar no manual (ex: tributação, churn, OTA)…" style="width:100%; padding:9px 12px 9px 34px; border-radius:10px; border:1.5px solid '+(dark?"#4a2e28":"#f0d5cc")+'; background:'+t.cardBg+'; font-size:13px; font-weight:500; color:'+t.text+'; outline:none;" />'+
          (S.kbQuery?'<span data-clear="kbq" style="position:absolute; right:11px; top:10px; cursor:pointer;">'+svg("X",15,t.text3)+'</span>':'')+
        '</div>'+
      '</div>'+
      '<div style="padding:12px 16px 24px; display:flex; flex-direction:column; gap:18px;">';
    var kf=filteredKB();
    if(kf.length===0) html+='<p style="text-align:center; color:'+t.text3+'; font-size:13px; padding:20px 0;">Nada encontrado para "'+esc(S.kbQuery)+'".</p>';
    kf.forEach(function(g){
      html+='<section>'+
        '<div style="display:flex; align-items:center; gap:8px; padding-bottom:6px; border-bottom:2px solid '+(dark?"#4a2e28":"#f0d5cc")+'; margin-bottom:4px;">'+
          svg(g.icon,14,A.coral)+
          '<span style="font-weight:700; font-size:12px; color:'+A.coral+'; text-transform:uppercase; letter-spacing:0.06em;">'+esc(g.group)+'</span>'+
          '<span style="margin-left:auto; font-size:11px; color:'+t.text3+'; font-weight:600;">'+g.items.length+'</span>'+
        '</div><div>';
      g.items.forEach(function(it,ii){ html+=kbRow(it,ii+1,t, ii===g.items.length-1); });
      html+='</div></section>';
    });
    html+='</div></div>';
  }

  html+='</div>';
  if(S.copOpen) html+=copilotoOverlay(t,dark);
  if(S.tipsOpen) html+=boasPraticasOverlay(t,dark);
  if(S.redOpen) html+=redatorOverlay(t,dark);
  if(S.procOpen) html+=procOverlay(t,dark);
  document.getElementById("root").innerHTML=html;
  wire();
}

function wire(){
  var r=document.getElementById("root");
  r.querySelectorAll("[data-copy]").forEach(function(btn){
    btn.addEventListener("click", function(){ copyText(decodeURIComponent(btn.getAttribute("data-copy")), btn); });
  });
  var pt=r.querySelector("[data-page-toggle]"); if(pt) pt.addEventListener("click", function(){ S.page=(S.page==="kb"?"cadencia":"kb"); S.editTarget=null; render(); });
  var pb=r.querySelector("[data-page-back]"); if(pb) pb.addEventListener("click", function(){ S.page="cadencia"; render(); });
  var tt=r.querySelector("[data-theme-toggle]"); if(tt) tt.addEventListener("click", function(){ S.dark=!S.dark; render(); });
  r.querySelectorAll("[data-tips-toggle]").forEach(function(tp){ tp.addEventListener("click", function(){ S.tipsOpen=!S.tipsOpen; if(S.tipsOpen){ S.copOpen=false; S.redOpen=false; S.procOpen=false; } render(); }); });
  var et=r.querySelector("[data-edit-toggle]"); if(et) et.addEventListener("click", function(){ S.editing=!S.editing; S.editTarget=null; if(S.editing){ S.query=""; S.tipsOpen=false; } render(); });
  var dl=r.querySelector("[data-download]"); if(dl) dl.addEventListener("click", function(){ downloadUpdated(); });
  r.querySelectorAll("[data-edit]").forEach(function(b){ b.addEventListener("click", function(e){ e.stopPropagation(); var v=b.getAttribute("data-edit"); var kind=v.split(":")[0]; var ref=v.substring(kind.length+1); if(kind==="msg"){ S.editTarget="msg|"+ref; } else if(kind==="objfield"){ S.editTarget="obj|"+ref; } else if(kind==="kb"){ S.editTarget="kb|"+ref; } render(); var ta=document.getElementById("editArea"); if(ta){ ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); } }); });
  var es=r.querySelector("[data-editsave]"); if(es) es.addEventListener("click", function(){ var tid=es.getAttribute("data-editsave"); var ta=document.getElementById("editArea"); if(ta){ applyEdit(tid, ta.value); } S.editTarget=null; render(); });
  var ec=r.querySelector("[data-editcancel]"); if(ec) ec.addEventListener("click", function(){ S.editTarget=null; render(); });
  r.querySelectorAll("[data-toggleblock]").forEach(function(b){ b.addEventListener("click", function(){ var id=b.getAttribute("data-toggleblock"); S.openBlock=(S.openBlock===id?"":id); render(); }); });
  r.querySelectorAll("[data-toggleobj]").forEach(function(b){ b.addEventListener("click", function(){ var id=b.getAttribute("data-toggleobj"); S.openObj[id]=!S.openObj[id]; render(); }); });
  r.querySelectorAll("[data-kbrow]").forEach(function(b){ b.addEventListener("click", function(){ var id=b.getAttribute("data-kbrow"); S.kbOpen[id]=!S.kbOpen[id]; render(); }); });
  r.querySelectorAll("[data-clear]").forEach(function(b){ b.addEventListener("click", function(){ var w=b.getAttribute("data-clear"); if(w==="q"){S.query="";}else{S.kbQuery="";} render(); }); });
  var q=document.getElementById("q"); if(q){ q.addEventListener("input", function(e){ S.query=e.target.value; var pos=e.target.selectionStart; render(); var n=document.getElementById("q"); if(n){ n.focus(); try{n.setSelectionRange(pos,pos);}catch(_){} } }); }
  var kbq=document.getElementById("kbq"); if(kbq){ kbq.addEventListener("input", function(e){ S.kbQuery=e.target.value; var pos=e.target.selectionStart; render(); var n=document.getElementById("kbq"); if(n){ n.focus(); try{n.setSelectionRange(pos,pos);}catch(_){} } }); }
  // ── Copiloto ──
  var copO=r.querySelector("[data-cop-open]"); if(copO) copO.addEventListener("click", function(){ S.copOpen=true; S.tipsOpen=false; S.redOpen=false; S.procOpen=false; render(); });
  var copC=r.querySelector("[data-cop-close]"); if(copC) copC.addEventListener("click", function(){ S.copOpen=false; render(); });
  var copR=r.querySelector("[data-cop-run]"); if(copR) copR.addEventListener("click", function(){ var ta=document.getElementById("copInput"); var txt=ta?ta.value:S.copInput; S.copInput=txt; S.copResults=copDetect(txt); S.copSel=0; render(); });
  r.querySelectorAll("[data-cop-sel]").forEach(function(b){ b.addEventListener("click", function(){ S.copSel=parseInt(b.getAttribute("data-cop-sel"),10)||0; render(); }); });
  var copIn=document.getElementById("copInput"); if(copIn) copIn.addEventListener("input", function(e){ S.copInput=e.target.value; });
  // ── Redator (Churn & Reversão) ──
  var redO=r.querySelector("[data-red-open]"); if(redO) redO.addEventListener("click", function(){ S.redOpen=true; S.copOpen=false; S.tipsOpen=false; S.procOpen=false; render(); });
  var redC=r.querySelector("[data-red-close]"); if(redC) redC.addEventListener("click", function(){ S.redOpen=false; render(); });
  r.querySelectorAll("[data-red-tab]").forEach(function(b){ b.addEventListener("click", function(){ S.redTab=b.getAttribute("data-red-tab"); S.redSel=0; render(); }); });
  r.querySelectorAll("[data-red-sel]").forEach(function(b){ b.addEventListener("click", function(){ S.redSel=parseInt(b.getAttribute("data-red-sel"),10)||0; render(); }); });
  var redQ=document.getElementById("redQ"); if(redQ){ redQ.addEventListener("input", function(e){ S.redQuery=e.target.value; S.redSel=0; var pos=e.target.selectionStart; render(); var n=document.getElementById("redQ"); if(n){ n.focus(); try{n.setSelectionRange(pos,pos);}catch(_){} } }); }
  // ── Processo de Churn ──
  var procO=r.querySelector("[data-proc-open]"); if(procO) procO.addEventListener("click", function(){ S.procOpen=true; S.copOpen=false; S.redOpen=false; S.tipsOpen=false; render(); });
  var procC=r.querySelector("[data-proc-close]"); if(procC) procC.addEventListener("click", function(){ S.procOpen=false; render(); });
  r.querySelectorAll("[data-proc-tab]").forEach(function(b){ b.addEventListener("click", function(){ S.procTab=b.getAttribute("data-proc-tab"); S.procStep=-1; render(); }); });
  r.querySelectorAll("[data-proc-step]").forEach(function(b){ b.addEventListener("click", function(){ var i=parseInt(b.getAttribute("data-proc-step"),10); S.procStep=(S.procStep===i?-1:i); render(); }); });
}
function copyText(text, btn){
  var done=function(){
    var old=btn.innerHTML;
    btn.innerHTML = CHECK_ICON + " Copiado!";
    btn.style.background = A.green;
    setTimeout(function(){ btn.innerHTML=old; btn.style.background=(S.dark?A.royal:A.navy); }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(function(){ fallbackCopy(text); done(); });
  } else { fallbackCopy(text); done(); }
}
function fallbackCopy(text){
  var ta=document.createElement("textarea"); ta.value=text; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.select();
  try{ document.execCommand("copy"); }catch(e){} document.body.removeChild(ta);
}

function downloadUpdated(){
  try {
    // Esvazia o #root no DOM antes de capturar, para o arquivo baixado abrir do zero.
    var rootEl = document.getElementById("root");
    var liveHtml = rootEl.innerHTML;
    rootEl.innerHTML = "";
    var src = document.documentElement.outerHTML;
    rootEl.innerHTML = liveHtml; // restaura a tela atual
    // Regenera as duas constantes de dados com o conteúdo editado (em memória).
    var newBlocks = "var BLOCKS = " + JSON.stringify(BLOCKS, null, 2) + ";";
    var newKB = "var KB_GROUPS = " + JSON.stringify(KB_GROUPS, null, 2) + ";";
    // Substitui a declaração antiga de cada array (do "var BLOCKS =" até o ";" que precede a próxima "var ")
    src = src.replace(/var BLOCKS = [\s\S]*?\];/, function(){ return newBlocks; });
    src = src.replace(/var KB_GROUPS = [\s\S]*?\];/, function(){ return newKB; });
    // Garante que o arquivo baixado abra no modo normal (não no de edição) e sem marca de "sujo".
    src = "<!DOCTYPE html>\n" + src;
    var blob = new Blob([src], { type: "text/html;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = "BussolaCSO.html";
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 1500);
    S.dirty = false;
    var btn = document.querySelector("[data-download]");
    if(btn){ var old=btn.innerHTML; btn.innerHTML = CHECK_ICON + ' <span style="color:'+A.white+';">Baixado!</span>'; setTimeout(function(){ btn.innerHTML=old; }, 1600); }
  } catch(e){
    alert("Não foi possível gerar o arquivo neste navegador. Tente abrir o HTML diretamente (dois cliques) e baixar de novo.");
  }
}

render();
</script>
